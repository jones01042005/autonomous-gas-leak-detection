<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeAir Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <h1>🏠 Multi-House Dashboard</h1>
    <!-- 🔥 TABS -->
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('dashboard')">Dashboard</button>
        <button class="tab-btn" onclick="showTab('alerts')">Alert History</button>
    </div>

    <!-- 🔥 WRAP EXISTING CONTENT -->
    <div id="dashboard" class="tab-content">

    <div id="cards"></div>

    <!-- ✅ NEW BIG CHART CONTAINER -->
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>

    </div> <!-- END dashboard -->

    <!-- 🚨 ALERT HISTORY TAB -->
    <div id="alerts" class="tab-content" style="display:none;">
        <h2 style="text-align:center;">🚨 Alert History</h2>

        <table id="alertTable">
            <thead>
                <tr>
                    <th>House</th>
                    <th>Status</th>
                    <th>Start Time</th>
                    <th>Resolved Time</th>
                    <th>Duration (sec)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="/static/script.js"></script>

</body>
</html>
